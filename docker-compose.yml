services:
  postgres:
    image: postgres:16-alpine
    container_name: disruptio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: disruptio
      POSTGRES_PASSWORD: disruptio_dev
      POSTGRES_DB: disruptio
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
